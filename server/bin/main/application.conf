ktor {
    deployment {
        port = 8080
    }
    application {
        modules = [ com.gamehub.server.ApplicationKt.main ]
    }
    development = true
}

database {
    driver = "org.h2.Driver"
    url = "jdbc:h2:file:./data/gamehub;MODE=MYSQL"
    user = "sa"
    password = ""
    maxPoolSize = 10
}

jwt {
    # این کلید یک رشته‌ی Base64 تصادفی ۲۵۶ بیتی است. در محیط Production حتماً آن را تعویض کنید.
    secret = "UH1JUB7KeJG7GvL4Jq/kH0q9GzMnG+E2p/J9lF3dW9c="
    issuer = "gamehub-server"
    accessTokenValidityMs = 86400000  # 24 hours
    refreshTokenValidityMs = 604800000 # 7 days
}

redis {
    enabled = false
    url = "redis://localhost:6379"
}

server {
    host = "0.0.0.0"
    port = 8080
}
marketSimulator {
    # فعال بودن شبیه‌ساز بازار (تغییر قیمت واقعی)
    # در نسخه اولیه false است، فقط داده جمع‌آوری می‌شود.
    enabled = false

    # بازه زمانی جمع‌آوری داده به ساعت (پیش‌فرض 24)
    intervalHours = 24

    # ضریب حساسیت پایه (مقدار بین 0.1 تا 2.0)
    # هرچه بیشتر، واکنش قیمت به تقاضا تندتر است.
    demandFactorBase = 0.5

    # حداقل نسبت قیمت به قیمت پایه (0.8 = 80%)
    minPriceRatio = 0.8

    # حداکثر نسبت قیمت به قیمت پایه (2.0 = 200%)
    maxPriceRatio = 2.0

    # تعداد فروش عادی مورد انتظار در هر بازه (برای محاسبه demandFactor)
    expectedSalesPerInterval = 50
}