apiVersion: "agones.dev/v1"
kind: Fleet
metadata:
  name: gamehub-game-servers
  namespace: gamehub
spec:
  replicas: 3
  template:
    spec:
      ports:
        - name: default
          portPolicy: Dynamic
          containerPort: 8080
      health:
        initialDelaySeconds: 5
        periodSeconds: 5
      template:
        spec:
          containers:
            - name: game-server
              image: gamehub-server:latest
              ports:
                - containerPort: 8080
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
