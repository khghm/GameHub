version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gamehub_postgres
    environment:
      POSTGRES_DB: gamehub
      POSTGRES_USER: gamehub
      POSTGRES_PASSWORD: gamehub123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gamehub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: